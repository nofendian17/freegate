{{define "partials/models.html"}}
{{if .}}
{{range .}}
<tr>
  <td>{{.ID}}</td>
  <td>
    <span class="pill tone-{{.ProviderTone}}">{{.Provider}}</span>
  </td>
  <td>
    {{if .IsFree}}<span class="pill tone-green">free</span>
    {{else}}<span class="pill tone-gray">—</span>
    {{end}}
  </td>
</tr>
{{end}}
{{else}}
<tr><td colspan="3" class="dim">no models loaded</td></tr>
{{end}}
{{end}}
