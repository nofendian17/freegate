<div id="pg-overlay" class="pg-overlay" role="dialog" aria-modal="true" aria-labelledby="pg-title" style="display:none">
  <div id="pg-panel" class="pg-panel">
    <header class="pg-header">
      <span id="pg-title" class="pg-title">> playground</span>
      <div class="pg-header-controls">
        <select id="pg-model" name="model" class="pg-model" aria-label="Model"
                hx-get="/partials/playground/models"
                hx-trigger="intersect once"
                hx-swap="beforeend"
                hx-on:htmx:after-request="window.fgPlayground.onModelsLoaded()">
          <option value="" disabled selected>// pick a model</option>
        </select>
        <label class="pg-stream-toggle">
          <input id="pg-stream" type="checkbox"
                 hx-on:change="window.fgPlayground.onStreamToggle(event)"> stream
        </label>
        <button id="pg-clear" class="btn-tertiary" title="Clear thread" type="button"
                hx-on:click="window.fgPlayground.clear()">clear</button>
        <button id="pg-close" class="pg-close" aria-label="Close playground" type="button"
                hx-on:click="window.fgPlayground.close()">x</button>
      </div>
    </header>
    <div id="pg-list" class="pg-body" role="log" aria-live="polite">
      <div id="pg-empty" class="pg-empty">// pick a model and say something</div>
    </div>
    <footer class="pg-footer">
      <div id="pg-system-wrap" class="pg-system-wrap collapsed">
        <button id="pg-system-toggle" class="pg-system-toggle" type="button" aria-expanded="false"
                hx-on:click="window.fgPlayground.toggleSystem()">// system prompt ▾</button>
        <textarea id="pg-system" class="pg-system" rows="2" placeholder="optional system prompt..."
                  hx-on:input="window.fgPlayground.onSystemInput(event)"></textarea>
      </div>
      <form id="pg-form" class="pg-input-row"
            hx-on:submit="window.fgPlayground.send(event)">
        <textarea id="pg-input" name="content" class="pg-input" rows="3"
                  placeholder="type a message... (Enter to send, Shift+Enter for new line)"
                  hx-on:keydown="window.fgPlayground.onInputKeydown(event)"></textarea>
        <button id="pg-send" class="btn-primary" type="submit">> send</button>
        <button id="pg-stop" class="pg-stop" type="button" style="display:none"
                hx-on:click="window.fgPlayground.stopStreaming()">> stop</button>
      </form>
    </footer>
  </div>
</div>
