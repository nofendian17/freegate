services:
  tor:
    build:
      context: .
      dockerfile: Dockerfile.tor
    container_name: fg-tor
    restart: unless-stopped
    environment:
      - TOR_PASS=${TOR_PASS:-freegate}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    volumes:
      - tor-data:/tmp/tor
    networks:
      - fg-net

  proxy:
    build: .
    container_name: fg-proxy
    ports:
      - "127.0.0.1:1234:1234"
    environment:
      - TOR_HOST=tor
      - TOR_PORT=9050
      - TOR_CTRL_PORT=9051
      - TOR_PASS=${TOR_PASS:-freegate}
      - PORT=1234
      - LOG_LEVEL=info
      - API_KEY=${API_KEY:-}
      - RATE_LIMIT=${RATE_LIMIT:-60}
      - UPSTREAM_URL_OPENCODE=${UPSTREAM_URL_OPENCODE:-https://opencode.ai/zen/v1}
      - UPSTREAM_KEY_OPENCODE=${UPSTREAM_KEY_OPENCODE:-public}
      - UPSTREAM_OPENCODE_FREE_ALLOWLIST=${UPSTREAM_OPENCODE_FREE_ALLOWLIST:-big-pickle}
      - UPSTREAM_URL_KILO=${UPSTREAM_URL_KILO:-https://api.kilo.ai/api/openrouter}
      - UPSTREAM_KEY_KILO=${UPSTREAM_KEY_KILO:-anonymous}
      - UPSTREAM_DEFAULT=${UPSTREAM_DEFAULT:-opencode}
    depends_on:
      tor:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - fg-net

volumes:
  tor-data:

networks:
  fg-net:
